name: Codex notify

on:
  push:
    branches:
      - main
      - "claude/*-build"
    paths:
      - "docs/coordination/aktiv-plan.md"
      - "docs/coordination/seneste-rapport.md"
      - "supabase/migrations/*.sql"
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Post comment to Codex review queue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate tracker issue
        id: tracker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NUMBER=$(gh issue list --search "Codex review queue in:title" --state open --json number,title --jq '.[] | select(.title == "Codex review queue") | .number' | head -n1)
          if [ -z "$NUMBER" ]; then
            echo "Tracker issue 'Codex review queue' not found. Skipping (must be opened manually once)." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect trigger type
        id: trigger
        if: steps.tracker.outputs.skip != 'true'
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          HEAD_REF: ${{ github.head_ref }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          # V4 slut-rapport-PR-event: PR åbnet hvor source-branch matcher claude/*-slut-rapport
          if [ "$EVENT" = "pull_request" ]; then
            case "$HEAD_REF" in
              claude/*-slut-rapport)
                echo "type=slut-rapport-pr" >> "$GITHUB_OUTPUT"
                ;;
              *)
                # PR fra anden branch — ignorer
                echo "type=skip" >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          # V4 build-branch-event: push til claude/<pakke>-build
          case "$REF" in
            refs/heads/claude/*-build)
              echo "type=build-batch" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # Push til main: brug bulk-push-range (V4-fix — før var det HEAD~1..HEAD som tabte multi-commit pushes)
          # Hvis BEFORE er nulhash (ny branch / force push uden parent), fald tilbage til HEAD~1
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          else
            changed=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || true)
          fi
          echo "changed files:" >&2
          echo "$changed" >&2

          aktiv_plan_changed=$(echo "$changed" | grep -E '^docs/coordination/aktiv-plan\.md$' || true)
          seneste_rapport_changed=$(echo "$changed" | grep -E '^docs/coordination/seneste-rapport\.md$' || true)

          if [ -n "$aktiv_plan_changed" ]; then
            echo "type=ny-plan-version" >> "$GITHUB_OUTPUT"
          elif [ -n "$seneste_rapport_changed" ]; then
            echo "type=slut-rapport-push" >> "$GITHUB_OUTPUT"
          else
            echo "type=ukendt" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose comment body
        id: body
        if: steps.tracker.outputs.skip != 'true' && steps.trigger.outputs.type != 'skip'
        env:
          TYPE: ${{ steps.trigger.outputs.type }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          HEAD_REF: ${{ github.head_ref }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          case "$TYPE" in
            build-batch)
              HEADER="**Build-batch pushet** — \`$REF\`"
              ACTION="Code committet ny build-batch. Codex skal lave per-batch review (V4 disciplin.md §6.1 build-fase). Læs \`docs/strategi/disciplin.md\` §8.3 (Codex-rolle) + §3.3 (end-to-end-spor)."
              ;;
            slut-rapport-pr)
              HEADER="**Slut-rapport-PR åbnet** — \`$HEAD_REF\`"
              ACTION="Claude.ai skal lave step-5 review **FØR merge** (V4 disciplin.md §2 Step 5). Læs \`docs/strategi/disciplin.md\` §8.1 (Claude.ai-rolle) + §7 (Stork-invariant-tjek)."
              ;;
            ny-plan-version)
              HEADER="**Ny plan-version** — \`docs/coordination/aktiv-plan.md\` ændret"
              ACTION="Code's tur er forbi. Codex skal reviewe planen som aktiv-plan peger på. Læs \`docs/strategi/disciplin.md\` §8.3 (Codex plan-review-fokus)."
              ;;
            slut-rapport-push)
              HEADER="**Slut-rapport pushet** — \`docs/coordination/seneste-rapport.md\` ændret"
              ACTION="Læs \`docs/coordination/seneste-rapport.md\` for at finde aktuel slut-rapport. Følg \`docs/strategi/disciplin.md\` §8.3 (Codex slut-rapport-review)."
              ;;
            ukendt)
              HEADER="**Codex-notify trigger** — ukendt fil-type ramt"
              ACTION="Tjek run-log for at se hvilke filer der trigger'ede. Sandsynligvis konfig-fejl i \`codex-notify.yml\`."
              ;;
          esac

          {
            echo "body<<NOTIFY_EOF"
            echo "$HEADER"
            echo ""
            echo "$ACTION"
            echo ""
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`$REF\`"
            echo "- Commit: \`$SHA\`"
            echo "- Aktør: \`$ACTOR\`"
            echo "- Run: <$RUN_URL>"
            echo "NOTIFY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post comment
        if: steps.tracker.outputs.skip != 'true' && steps.trigger.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.tracker.outputs.number }}
          BODY: ${{ steps.body.outputs.body }}
        run: |
          set -euo pipefail
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
